<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DustVault | WEX Enterprise Pilot Dashboard</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b0f1a; color: #e8edf5; min-height: 100vh; }
    
    /* TOPBAR */
    .topbar { background: #060910; border-bottom: 1px solid #1e2d45; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 18px; font-weight: 800; letter-spacing: -.5px; color: #fff; } .logo span { color: #00d4ff; }
    .top-badges { display: flex; gap: 10px; align-items: center; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: .05em; text-transform: uppercase; }
    .badge-live { background: #00c853; color: #fff; animation: blink 2s infinite; }
    .badge-wex { background: rgba(0,212,255,0.1); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
    .badge-vosb { background: rgba(255,215,0,0.1); color: #ffd700; border: 1px solid rgba(255,215,0,0.25); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
    .back-link { font-size: 11px; color: #5a7a9a; text-decoration: none; border: 1px solid #1e2d45; padding: 4px 12px; border-radius: 6px; transition: all .2s; }
    .back-link:hover { color: #00d4ff; border-color: #00d4ff; }
    
    /* MISSION STRIP */
    .mission-strip { background: linear-gradient(90deg, #061428, #0a1e38, #061428); border-bottom: 2px solid rgba(255,215,0,0.3); padding: 10px 32px; display: flex; align-items: center; justify-content: center; gap: 16px; text-align: center; }
    .mission-text { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }
    .mission-text strong { color: #ffd700; }
    
    /* PILOT HEADER */
    .pilot-header { background: linear-gradient(135deg, #0a1628 0%, #0f2040 100%); border-bottom: 1px solid #1e2d45; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .pilot-title { font-size: 13px; font-weight: 700; color: #00d4ff; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .pilot-sub { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .pilot-meta { font-size: 11px; color: #5a7a9a; margin-top: 4px; display: flex; gap: 15px; }
    .pilot-actions { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #00d4ff; color: #060910; font-size: 12px; font-weight: 800; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: .05em; }
    .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }
    .btn-primary:disabled { background: #1e2d45; color: #3a4d60; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; color: #00d4ff; font-size: 12px; font-weight: 700; padding: 10px 20px; border: 1px solid rgba(0,212,255,0.3); border-radius: 6px; cursor: pointer; transition: all .2s; }
    .btn-outline:hover { background: rgba(0,212,255,0.05); border-color: #00d4ff; }
    
    /* MAIN LAYOUT */
    .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    
    /* KPI DISPLAY PANELS */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    .kpi { background: #0f1824; border: 1px solid #1e2d45; border-radius: 10px; padding: 18px 16px; transition: all .2s; position: relative; overflow: hidden; }
    .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent, #1e2d45); }
    .kpi:hover { border-color: #2a3d55; transform: translateY(-2px); }
    .kpi-label { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; font-weight: 600; }
    .kpi-value { font-size: 26px; font-weight: 800; color: var(--accent, #fff); letter-spacing: -.5px; }
    .kpi-sub { font-size: 10px; color: #3a4d60; margin-top: 4px; }
    
    /* PROGRESS TRACKING WRAPPERS */
    .scan-wrapper { background: #0f1824; border: 1px solid #1e2d45; border-radius: 10px; padding: 20px; margin-bottom: 20px; display: none; }
    .scan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .scan-title { font-size: 13px; font-weight: 700; color: #00d4ff; text-transform: uppercase; letter-spacing: .05em; }
    .scan-pct { font-size: 20px; font-weight: 800; color: #00d4ff; }
    .phase-bars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .phase-bar-wrap { background: #060910; border: 1px solid #1e2d45; border-radius: 6px; padding: 12px; }
    .phase-bar-label { font-size: 10px; color: #5a7a9a; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
    .phase-bar-track { height: 6px; background: #1e2d45; border-radius: 3px; overflow: hidden; }
    .phase-bar-fill { height: 100%; border-radius: 3px; width: 0%; transition: width .15s linear; }
    .phase-bar-status { font-size: 10px; margin-top: 5px; color: #3a4d60; }
    .scan-log { background: #060910; border: 1px solid #1e2d45; border-radius: 6px; padding: 12px; height: 100px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; }
    .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-line.ok { color: #00c853; }
    .log-line.info { color: #00d4ff; }
    .log-line.warn { color: #ffd700; }
    
    /* QUEUE ARCHITECTURE GRID */
    .grid-main { display: grid; grid-template-columns: 1fr 360px; gap: 16px; }
    .table-card { background: #0f1824; border: 1px solid #1e2d45; border-radius: 10px; overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #1e2d45; display: flex; align-items: center; justify-content: space-between; background: #0a1220; }
    .card-title { font-size: 13px; font-weight: 700; color: #fff; }
    .card-sub { font-size: 11px; color: #5a7a9a; margin-top: 2px; }
    .filter-row { display: flex; gap: 8px; }
    .filter-btn { font-size: 10px; padding: 4px 10px; border-radius: 20px; border: 1px solid #1e2d45; background: transparent; color: #5a7a9a; cursor: pointer; transition: all .15s; font-weight: 600; text-transform: uppercase; }
    .filter-btn.active, .filter-btn:hover { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.05); }
    
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 9px 14px; font-size: 10px; font-weight: 700; color: #3a4d60; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid #1e2d45; background: #0a1220; }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(30,45,69,0.5); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,212,255,0.02); }
    
    .risk-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
    .risk-critical { background: rgba(255,59,59,0.12); color: #ff6b6b; border: 1px solid rgba(255,59,59,0.2); }
    .risk-high { background: rgba(255,152,0,0.12); color: #ffb74d; border: 1px solid rgba(255,152,0,0.2); }
    .risk-med { background: rgba(255,215,0,0.1); color: #ffd700; border: 1px solid rgba(255,215,0,0.2); }
    .risk-low { background: rgba(0,200,83,0.1); color: #69f0ae; border: 1px solid rgba(0,200,83,0.15); }
    .days-critical { color: #ff6b6b; font-weight: 700; }
    .days-high { color: #ffb74d; font-weight: 600; }
    .days-med { color: #ffd700; }
    .days-ok { color: #69f0ae; }
    .mono { font-family: 'Courier New', monospace; font-size: 11px; color: #5a7a9a; }
    
    .outreach-btn { font-size: 10px; padding: 5px 12px; border-radius: 6px; border: 1px solid #1e2d45; background: transparent; color: #5a7a9a; cursor: pointer; font-weight: 700; transition: all .15s; text-transform: uppercase; }
    .outreach-btn:hover { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.05); }
    .outreach-btn.sent { background: rgba(0,200,83,0.1); border-color: rgba(0,200,83,0.3); color: #69f0ae; }
    
    /* UTILITIES MODULATOR SIDEBAR */
    .right-col { display: flex; flex-direction: column; gap: 14px; }
    .panel { background: #0f1824; border: 1px solid #1e2d45; border-radius: 10px; overflow: hidden; }
    .panel-head { padding: 12px 16px; border-bottom: 1px solid #1e2d45; background: #0a1220; }
    .panel-title { font-size: 11px; font-weight: 700; color: #00d4ff; text-transform: uppercase; letter-spacing: .06em; }
    .panel-body { padding: 16px; }
    
    /* ALGORITHMIC SLIDERS */
    .proj-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(30,45,69,0.5); font-size: 12px; }
    .proj-row:last-child { border-bottom: none; }
    .proj-label { color: #5a7a9a; }
    .proj-val { font-weight: 700; color: #fff; }
    .proj-val.cyan { color: #00d4ff; }
    .proj-val.green { color: #69f0ae; }
    .proj-val.red { color: #ff6b6b; }
    .proj-val.gold { color: #ffd700; }
    .slider-wrap { margin: 12px 0; }
    .slider-label-row { display: flex; justify-content: space-between; font-size: 11px; color: #5a7a9a; margin-bottom: 6px; }
    .slider-label-row strong { color: #fff; font-size: 13px; }
    input[type=range] { width: 100%; accent-color: #00d4ff; cursor: pointer; }
    .prog-track { height: 6px; background: #1e2d45; border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .prog-fill { height: 100%; background: linear-gradient(90deg,#00d4ff,#00c853); border-radius: 3px; transition: width .3s ease; }
    
    /* FOUNDATION VETERAN MATRIX */
    .vet-panel { background: linear-gradient(135deg, #061428, #0a1e38); border: 1px solid rgba(255,215,0,0.25); border-radius: 10px; padding: 18px; }
    .vet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .vet-icon { font-size: 24px; }
    .vet-title { font-size: 12px; font-weight: 800; color: #ffd700; text-transform: uppercase; letter-spacing: .05em; line-height: 1.4; }
    .vet-amount { font-size: 40px; font-weight: 900; color: #ffd700; text-align: center; letter-spacing: -1px; margin: 8px 0 4px; }
    .vet-amount-label { font-size: 11px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.6; margin-bottom: 14px; }
    .vet-amount-label strong { color: #ffd700; }
    .vet-divider { border: none; border-top: 1px solid rgba(255,215,0,0.1); margin: 12px 0; }
    .vet-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; }
    .vet-label { color: rgba(255,255,255,0.45); }
    .vet-val { color: #ffd700; font-weight: 700; }
